<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>临时工作提醒</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #24302f;
      --muted: #6d7773;
      --line: #dfe5df;
      --brand: #176b63;
      --brand-2: #d9634d;
      --warn: #b76b12;
      --done: #5f7d45;
      --shadow: 0 18px 50px rgba(33, 48, 46, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(23, 107, 99, .08), transparent 260px),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(223, 229, 223, .9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .capture {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      color: #43504c;
      font-weight: 650;
    }

    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 11px 12px;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.55;
    }

    textarea:focus, input:focus, select:focus {
      border-color: rgba(23, 107, 99, .72);
      box-shadow: 0 0 0 3px rgba(23, 107, 99, .12);
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: var(--radius);
      background: #edf2ef;
      color: var(--ink);
      border: 1px solid transparent;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      margin-right: 7px;
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
    }

    .btn.danger {
      background: #fff0ed;
      color: #9e3e2d;
      border-color: #f1c8bf;
    }

    .btn.icon {
      width: 38px;
      min-height: 38px;
      padding: 0;
      background: #f4f6f3;
    }

    .btn.icon svg { margin: 0; }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .board {
      min-width: 0;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      margin-bottom: 12px;
      align-items: center;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      min-height: 36px;
      padding: 0 12px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      font-weight: 700;
    }

    .tab.active {
      background: #e8f0ed;
      color: var(--brand);
      border-color: #cae0db;
    }

    .search {
      max-width: 260px;
      min-width: 180px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 74px;
    }

    .stat b {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      box-shadow: 0 8px 24px rgba(33, 48, 46, .06);
    }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #aab7b2;
      background: #fff;
      margin-top: 2px;
      display: grid;
      place-items: center;
    }

    .check.done {
      background: var(--done);
      border-color: var(--done);
      color: #fff;
    }

    .check svg {
      width: 15px;
      height: 15px;
    }

    .card.done .title,
    .card.done .note {
      text-decoration: line-through;
      color: #8a948f;
    }

    .title {
      font-size: 16px;
      line-height: 1.35;
      margin: 0 0 8px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .note {
      color: #4e5b57;
      line-height: 1.55;
      margin: 0 0 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 9px;
      background: #f1f4f1;
      color: #52615d;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.high {
      background: #fff0ed;
      color: #a34431;
    }

    .pill.medium {
      background: #fff7e8;
      color: #98610d;
    }

    .pill.low {
      background: #edf5ee;
      color: #54723a;
    }

    .pill.overdue {
      background: #fde7df;
      color: #9d3928;
    }

    .empty {
      background: rgba(255,255,255,.7);
      border: 1px dashed #cbd5cf;
      border-radius: var(--radius);
      padding: 32px;
      color: var(--muted);
      text-align: center;
    }

    .file-input {
      display: none;
    }

    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .capture {
        position: static;
      }

      header {
        display: block;
      }

      .header-actions {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .toolbar {
        display: grid;
      }

      .search {
        max-width: none;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 20px, 1180px);
        padding-top: 18px;
      }

      .quick-row,
      .stats {
        grid-template-columns: 1fr;
      }

      .card {
        grid-template-columns: auto 1fr;
      }

      .card-actions {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>临时工作提醒</h1>
        <p class="subtitle">把零散工作先收进来，再按今天、逾期、已完成慢慢清掉。</p>
      </div>
      <div class="header-actions">
        <button class="btn" id="notifyBtn" title="开启浏览器提醒">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          开启提醒
        </button>
        <button class="btn" id="exportBtn" title="导出备份">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          导出
        </button>
        <button class="btn" id="importBtn" title="导入备份">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          导入
        </button>
        <input class="file-input" id="fileInput" type="file" accept="application/json">
      </div>
    </header>

    <section class="shell">
      <form class="panel capture" id="reminderForm">
        <div class="field">
          <label for="quickText">快速收录</label>
          <textarea id="quickText" placeholder="例如：明天上午10点提醒我跟进供应商报价，高优先级"></textarea>
        </div>

        <div class="quick-row">
          <div class="field">
            <label for="dueDate">日期</label>
            <input id="dueDate" type="date">
          </div>
          <div class="field">
            <label for="dueTime">时间</label>
            <input id="dueTime" type="time">
          </div>
        </div>

        <div class="quick-row">
          <div class="field">
            <label for="priority">优先级</label>
            <select id="priority">
              <option value="medium">普通</option>
              <option value="high">高</option>
              <option value="low">低</option>
            </select>
          </div>
          <div class="field">
            <label for="tag">分类</label>
            <input id="tag" placeholder="客户 / 会议 / 交付">
          </div>
        </div>

        <div class="button-row">
          <button class="btn primary" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            收录提醒
          </button>
          <button class="btn" type="button" id="parseBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h7"/><path d="M17 14l3 3-3 3"/></svg>
            识别文本
          </button>
        </div>
        <p class="hint">可识别：今天、明天、后天、周一到周日、上午/下午、10点、18:30、高优先级、低优先级。</p>
      </form>

      <section class="board">
        <div class="stats" aria-live="polite">
          <div class="stat"><b id="statOpen">0</b><span>待处理</span></div>
          <div class="stat"><b id="statToday">0</b><span>今天</span></div>
          <div class="stat"><b id="statOverdue">0</b><span>逾期</span></div>
          <div class="stat"><b id="statDone">0</b><span>已完成</span></div>
        </div>

        <div class="panel toolbar">
          <div class="tabs" id="tabs">
            <button class="tab active" data-filter="open" type="button">待处理</button>
            <button class="tab" data-filter="today" type="button">今天</button>
            <button class="tab" data-filter="overdue" type="button">逾期</button>
            <button class="tab" data-filter="all" type="button">全部</button>
            <button class="tab" data-filter="done" type="button">已完成</button>
          </div>
          <input class="search" id="searchInput" placeholder="搜索提醒">
        </div>

        <div class="list" id="list"></div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "temporary-work-reminders-v1";
    const $ = (id) => document.getElementById(id);

    let reminders = loadReminders();
    let activeFilter = "open";

    const form = $("reminderForm");
    const quickText = $("quickText");
    const dueDate = $("dueDate");
    const dueTime = $("dueTime");
    const priority = $("priority");
    const tag = $("tag");
    const list = $("list");
    const searchInput = $("searchInput");

    function todayAtStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function toDateInput(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function dateFromInput(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function loadReminders() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveReminders() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(reminders));
    }

    function parseText(text) {
      const clean = text.trim();
      const now = new Date();
      let date = null;
      let time = "";
      let level = "medium";

      if (/高优先|紧急|重要|加急/.test(clean)) level = "high";
      if (/低优先|不急|有空/.test(clean)) level = "low";

      const base = todayAtStart();
      if (/今天|今晚/.test(clean)) date = new Date(base);
      if (/明天/.test(clean)) date = new Date(base.getFullYear(), base.getMonth(), base.getDate() + 1);
      if (/后天/.test(clean)) date = new Date(base.getFullYear(), base.getMonth(), base.getDate() + 2);

      const weekMap = { "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6, "日": 0, "天": 0 };
      const weekMatch = clean.match(/(?:周|星期)([一二三四五六日天])/);
      if (!date && weekMatch) {
        const target = weekMap[weekMatch[1]];
        const current = now.getDay();
        let diff = target - current;
        if (diff <= 0) diff += 7;
        date = new Date(base.getFullYear(), base.getMonth(), base.getDate() + diff);
      }

      const timeMatch = clean.match(/(?:(上午|早上|下午|晚上|今晚|中午)\s*)?(\d{1,2})(?:[:：点](\d{1,2})?)?/);
      if (timeMatch) {
        let hour = Number(timeMatch[2]);
        const minute = timeMatch[3] ? Number(timeMatch[3]) : 0;
        const part = timeMatch[1] || "";
        if (/下午|晚上|今晚/.test(part) && hour < 12) hour += 12;
        if (/中午/.test(part) && hour < 11) hour += 12;
        if (hour >= 0 && hour < 24 && minute >= 0 && minute < 60) {
          time = `${pad(hour)}:${pad(minute)}`;
        }
      }

      return {
        title: clean.replace(/提醒我|提醒|高优先级|低优先级|普通优先级/g, "").trim() || clean,
        date: date ? toDateInput(date) : "",
        time,
        priority: level
      };
    }

    function addReminder() {
      const text = quickText.value.trim();
      if (!text) {
        quickText.focus();
        return;
      }

      const parsed = parseText(text);
      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        title: parsed.title,
        note: text,
        dueDate: dueDate.value || parsed.date,
        dueTime: dueTime.value || parsed.time,
        priority: priority.value || parsed.priority,
        tag: tag.value.trim(),
        done: false,
        createdAt: new Date().toISOString()
      };

      reminders.unshift(item);
      saveReminders();
      checkDueNotifications();
      form.reset();
      priority.value = "medium";
      activeFilter = "open";
      setActiveTab();
      render();
      quickText.focus();
    }

    function isToday(item) {
      return item.dueDate === toDateInput(new Date());
    }

    function dueDateTime(item) {
      if (!item.dueDate) return null;
      const date = dateFromInput(item.dueDate);
      if (item.dueTime) {
        const [h, m] = item.dueTime.split(":").map(Number);
        date.setHours(h, m, 0, 0);
      } else {
        date.setHours(23, 59, 59, 999);
      }
      return date;
    }

    function isOverdue(item) {
      const due = dueDateTime(item);
      return !item.done && due && due < new Date();
    }

    function isDueForNotification(item) {
      const due = dueDateTime(item);
      return !item.done && !item.notifiedAt && item.dueDate && item.dueTime && due && due <= new Date();
    }

    function formatDue(item) {
      if (!item.dueDate) return "未定时间";
      const date = dateFromInput(item.dueDate);
      const label = `${date.getMonth() + 1}月${date.getDate()}日`;
      return item.dueTime ? `${label} ${item.dueTime}` : label;
    }

    function priorityLabel(value) {
      return { high: "高优先级", medium: "普通", low: "低优先级" }[value] || "普通";
    }

    function filteredReminders() {
      const query = searchInput.value.trim().toLowerCase();
      return reminders
        .filter((item) => {
          if (activeFilter === "open") return !item.done;
          if (activeFilter === "today") return !item.done && isToday(item);
          if (activeFilter === "overdue") return isOverdue(item);
          if (activeFilter === "done") return item.done;
          return true;
        })
        .filter((item) => {
          if (!query) return true;
          return [item.title, item.note, item.tag].join(" ").toLowerCase().includes(query);
        })
        .sort((a, b) => {
          if (a.done !== b.done) return a.done ? 1 : -1;
          const ap = { high: 0, medium: 1, low: 2 }[a.priority] ?? 1;
          const bp = { high: 0, medium: 1, low: 2 }[b.priority] ?? 1;
          const ad = dueDateTime(a)?.getTime() ?? Number.MAX_SAFE_INTEGER;
          const bd = dueDateTime(b)?.getTime() ?? Number.MAX_SAFE_INTEGER;
          return ad - bd || ap - bp;
        });
    }

    function renderStats() {
      $("statOpen").textContent = reminders.filter((item) => !item.done).length;
      $("statToday").textContent = reminders.filter((item) => !item.done && isToday(item)).length;
      $("statOverdue").textContent = reminders.filter(isOverdue).length;
      $("statDone").textContent = reminders.filter((item) => item.done).length;
    }

    function render() {
      renderStats();
      const items = filteredReminders();
      list.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "这里暂时没有提醒。";
        list.appendChild(empty);
        return;
      }

      for (const item of items) {
        const card = document.createElement("article");
        card.className = `card${item.done ? " done" : ""}`;

        const check = document.createElement("button");
        check.className = `check${item.done ? " done" : ""}`;
        check.type = "button";
        check.title = item.done ? "标记为待处理" : "标记为完成";
        check.innerHTML = item.done ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>' : "";
        check.addEventListener("click", () => toggleDone(item.id));

        const content = document.createElement("div");
        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = item.title;
        const note = document.createElement("p");
        note.className = "note";
        note.textContent = item.note;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `
          <span class="pill ${item.priority}">${priorityLabel(item.priority)}</span>
          <span class="pill ${isOverdue(item) ? "overdue" : ""}">${formatDue(item)}</span>
          ${item.tag ? `<span class="pill">${escapeHtml(item.tag)}</span>` : ""}
        `;
        content.append(title, note, meta);

        const actions = document.createElement("div");
        actions.className = "card-actions";
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn icon";
        deleteBtn.type = "button";
        deleteBtn.title = "删除";
        deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
        deleteBtn.addEventListener("click", () => deleteReminder(item.id));
        actions.appendChild(deleteBtn);

        card.append(check, content, actions);
        list.appendChild(card);
      }
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function toggleDone(id) {
      reminders = reminders.map((item) => item.id === id ? { ...item, done: !item.done } : item);
      saveReminders();
      render();
    }

    function deleteReminder(id) {
      reminders = reminders.filter((item) => item.id !== id);
      saveReminders();
      render();
    }

    async function requestNotificationPermission() {
      if (!("Notification" in window)) {
        alert("这个浏览器不支持系统通知。页面打开时，我仍会用弹窗提醒你。");
        return;
      }

      if (Notification.permission === "granted") {
        alert("浏览器提醒已经开启。保持页面打开，到点会弹出通知。");
        return;
      }

      const permission = await Notification.requestPermission();
      alert(permission === "granted"
        ? "浏览器提醒已开启。保持页面打开，到点会弹出通知。"
        : "你还没有允许通知。到点时只能在页面打开状态下用普通弹窗提醒。");
    }

    function showDueNotification(item) {
      const body = `${formatDue(item)} ${item.tag ? "｜" + item.tag : ""}`;
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(item.title || "临时工作提醒", { body });
      } else {
        alert(`临时工作提醒\n\n${item.title}\n${body}`);
      }
    }

    function checkDueNotifications() {
      const dueItems = reminders.filter(isDueForNotification);
      if (!dueItems.length) return;

      const now = new Date().toISOString();
      for (const item of dueItems) {
        showDueNotification(item);
      }

      reminders = reminders.map((item) => {
        if (!dueItems.some((dueItem) => dueItem.id === item.id)) return item;
        return { ...item, notifiedAt: now };
      });
      saveReminders();
      render();
    }

    function setActiveTab() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.filter === activeFilter);
      });
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(reminders, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `临时工作提醒-${toDateInput(new Date())}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("invalid");
          reminders = data;
          saveReminders();
          render();
        } catch {
          alert("导入失败，请选择有效的提醒备份文件。");
        }
      };
      reader.readAsText(file);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      addReminder();
    });

    $("parseBtn").addEventListener("click", () => {
      const parsed = parseText(quickText.value);
      if (parsed.date) dueDate.value = parsed.date;
      if (parsed.time) dueTime.value = parsed.time;
      priority.value = parsed.priority;
    });

    $("tabs").addEventListener("click", (event) => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      activeFilter = tab.dataset.filter;
      setActiveTab();
      render();
    });

    searchInput.addEventListener("input", render);
    $("notifyBtn").addEventListener("click", requestNotificationPermission);
    $("exportBtn").addEventListener("click", exportData);
    $("importBtn").addEventListener("click", () => $("fileInput").click());
    $("fileInput").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) importData(file);
      event.target.value = "";
    });

    render();
    checkDueNotifications();
    setInterval(checkDueNotifications, 30000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) checkDueNotifications();
    });
  </script>
</body>
</html>
